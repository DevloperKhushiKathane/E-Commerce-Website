<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

<!-- ✅ Navbar -->
<div class="container">
  <header class="d-flex flex-wrap align-items-center justify-content-between py-3 mb-4 border-bottom sticky-top bg-white">
    
    <div class="col-md-3">
      <h4>MyShop</h4>
    </div>

    <ul class="nav col-12 col-md-auto justify-content-center">
      <li><a href="index.html" class="nav-link px-2">Home</a></li>
      <li><a href="product.html" class="nav-link px-2">Our Product</a></li>
      <li><a href="contact.html" class="nav-link px-2 fw-bold">Contact</a></li>
    </ul>

    <div class="col-md-3 text-end">
      <button class="btn btn-outline-primary me-2">Login</button>
      <button class="btn btn-primary">Sign-up</button>
    </div>

  </header>
</div>

<!-- ✅ Contact Form -->
<div class="container mt-5">

  <h2 class="text-center fw-bold">Contact Us</h2>
  <p class="text-center text-muted">Fill the form to place your order</p>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <form class="mt-4">

        <input type="text" class="form-control mb-3" placeholder="Your Name" required>

        <input type="email" class="form-control mb-3" placeholder="Your Email" required>

        <input type="text" class="form-control mb-3" placeholder="Product Name">

        <textarea class="form-control mb-3" rows="4" placeholder="Your Address / Message"></textarea>

        <button type="submit" class="btn btn-primary w-100">Submit</button>

      </form>

    </div>
  </div>

</div>

</body>
</html>
